<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1d23; display: flex; flex-direction: column; font-family: system-ui, sans-serif; }

    #term-header {
      flex-shrink: 0;
      background: #23272f;
      border-bottom: 1px solid #3a3f4a;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #term-title { font-size: 13px; color: #d4d8e2; font-weight: 600; flex: 1; }
    #term-status { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: #2c313a; border: 1px solid #3a3f4a; color: #7a8199; }
    #term-status.connected { background: rgba(76,175,125,.15); border-color: #4caf7d; color: #4caf7d; }
    #term-status.error     { background: rgba(224,82,82,.15); border-color: #e05252; color: #e05252; }

    #port-label { font-size: 11px; color: #7a8199; }
    #port-input {
      width: 64px; font-size: 12px; padding: 2px 6px;
      background: #2c313a; border: 1px solid #3a3f4a; border-radius: 6px;
      color: #d4d8e2; text-align: center;
    }
    #port-input:focus { outline: none; border-color: #4f8ef7; }

    #term-container { flex: 1; padding: 6px; overflow: hidden; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: hidden !important; }
  </style>
</head>
<body>

<div id="term-header">
  <span id="term-title">Terminal</span>
  <span id="port-label">SSH ポート</span>
  <input id="port-input" type="number" min="1" max="65535" title="Enter で再接続">
  <span id="term-status">接続中...</span>
</div>
<div id="term-container"></div>

<script>
  const params   = new URLSearchParams(location.search);
  const nodeName = params.get('node') || 'unknown';
  const defaultPort = parseInt(params.get('port') || '22', 10);

  document.title = `CLI: ${nodeName}`;
  document.getElementById('term-title').textContent = `CLI — ${nodeName}`;

  const elPortInput = document.getElementById('port-input');
  elPortInput.value = defaultPort;

  const term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: "'Cascadia Code', 'Fira Code', Consolas, monospace",
    theme: {
      background: '#1a1d23',
      foreground: '#d4d8e2',
      cursor: '#4f8ef7',
      selectionBackground: 'rgba(79,142,247,0.3)',
      black: '#1a1d23', brightBlack: '#4a5060',
      red: '#e05252',   brightRed: '#ff6b6b',
      green: '#4caf7d', brightGreen: '#6dda9f',
      yellow: '#f0a940',brightYellow: '#ffc261',
      blue: '#4f8ef7',  brightBlue: '#6aa3ff',
      magenta: '#b07ceb',brightMagenta: '#c89aff',
      cyan: '#4ec9b0',  brightCyan: '#70ddc6',
      white: '#d4d8e2', brightWhite: '#ffffff',
    },
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('term-container'));
  fitAddon.fit();

  window.addEventListener('resize', () => fitAddon.fit());

  const elStatus = document.getElementById('term-status');
  const wsProto  = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let ws = null;

  function connect(port) {
    if (ws) {
      ws.onclose = null;
      ws.close();
    }
    elStatus.textContent = '接続中...';
    elStatus.className = '';

    ws = new WebSocket(
      `${wsProto}//${location.host}/ws/terminal/${encodeURIComponent(nodeName)}?port=${port}`
    );

    ws.onopen = () => {
      elStatus.textContent = '接続済み';
      elStatus.className = 'connected';
    };

    ws.onclose = () => {
      elStatus.textContent = '切断';
      elStatus.className = 'error';
      term.write('\r\n\r\n\x1b[33m--- セッションが終了しました ---\x1b[0m\r\n');
    };

    ws.onerror = () => {
      elStatus.textContent = 'エラー';
      elStatus.className = 'error';
    };

    ws.onmessage = event => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'output') term.write(msg.data);
      } catch {
        term.write(event.data);
      }
    };
  }

  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'input', data }));
    }
  });

  term.onResize(({ cols, rows }) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  elPortInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const p = parseInt(elPortInput.value, 10);
      if (p > 0 && p <= 65535) connect(p);
      term.focus();
    }
  });

  connect(defaultPort);
</script>
</body>
</html>
