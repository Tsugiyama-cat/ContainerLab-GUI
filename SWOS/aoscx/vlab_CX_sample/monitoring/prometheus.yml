global:
  scrape_interval: 30s

scrape_configs:
  # SNMP（if_mib + public_v2）を snmp_exporter 経由で取得
  - job_name: 'snmp'
    metrics_path: /snmp
    params:
      auth: [public_v2]
      module: [if_mib]
    static_configs:
      - targets:
          - 172.20.20.11   # cx1 の mgmt IP
          - 172.20.20.12   # cx2 の mgmt IP
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116  # 実際に叩く exporter
  # Exporter 自身のメトリクス
  - job_name: 'snmp_exporter'
    static_configs:
      - targets: ['snmp-exporter:9116']
