name: cx2-snmp-grafana

mgmt:
  ipv4-subnet: 172.20.20.0/24  # Containerlab mgmt NW
# ※ 固定IPを使う場合は、同じ mgmt ネットに接続する全ノードで mgmt-ipv4 を定義します。:contentReference[oaicite:1]{index=1}

topology:
  nodes:
    cx1:
      kind: aruba_aoscx
      image: vrnetlab/aruba_arubaos-cx:10.16.1006  # 例: vrnetlabで作成したAOS-CX仮想イメージ
      mgmt-ipv4: 172.20.20.11
      startup-config: configs/cx1.cfg   # 起動時コンフィグを適用（差分でもOK）:contentReference[oaicite:2]{index=2}

    cx2:
      kind: aruba_aoscx
      image: vrnetlab/aruba_arubaos-cx:10.16.1006
      mgmt-ipv4: 172.20.20.12
      startup-config: configs/cx2.cfg

    # クライアント（ツール入り軽量Linux）：
    client1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      mgmt-ipv4: 172.20.20.21
      # 起動時にeth1へIP設定してGWをスイッチのSVIへ
      cmd: |
        ip link set eth1 up
        ip addr add 192.168.10.10/24 dev eth1
        ip route add default via 192.168.10.1
      # linux kind の起動コマンドは cmd で指定できます。:contentReference[oaicite:3]{index=3}

    client2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      mgmt-ipv4: 172.20.20.22
      cmd: |
        ip link set eth1 up
        ip addr add 192.168.20.10/24 dev eth1
        ip route add default via 192.168.20.1

    # SNMP Exporter（Prometheus がここ経由で SNMP を取得）
    snmp-exporter:
      kind: linux
      image: prom/snmp-exporter:latest
      mgmt-ipv4: 172.20.20.33
      # デフォルトの snmp.yml（if_mib / public_v2 を含む）を使用します。:contentReference[oaicite:4]{index=4}

    # Prometheus
    prometheus:
      kind: linux
      image: prom/prometheus:latest
      mgmt-ipv4: 172.20.20.31
      binds:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      ports:
        - "9090:9090"

    # Grafana
    grafana:
      kind: linux
      image: grafana/grafana:latest
      mgmt-ipv4: 172.20.20.32
      env:
        GF_SECURITY_ADMIN_PASSWORD: your_grafana_password_here
      binds:
        - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
       ports:
        - "3000:3000"

  links:
    # スイッチ間（L3 ポート）
    - endpoints: ["cx1:1/1/2", "cx2:1/1/2"]
    # クライアント接続（各スイッチのアクセスVLAN 10）
    - endpoints: ["cx1:1/1/3", "client1:eth1"]
    - endpoints: ["cx2:1/1/3", "client2:eth1"]
