hostname CX1

! --- SNMP（管理は "default" VRF 側で受ける想定）---
snmp-server vrf default
snmp-server community public ro
snmp-server system-location "Lab"
snmp-server system-contact "admin@example.local"
! AOS-CX はSNMPをVRF単位で有効化。community で v1/v2c を設定します。:contentReference[oaicite:6]{index=6}

! --- クライアント用 VLAN/ポート ---
vlan 10
  name CLIENTS

interface 1/1/3
  no shutdown
  description CLIENT1
  access vlan 10

interface vlan 10
  ip address 192.168.10.1/24

! --- スイッチ間 L3 リンク ---
interface 1/1/2
  no shutdown
  routing
  ip address 10.0.12.0/31
! 物理IFへIPを入れると自動的にL3 IFとして動作します（routing コマンド/インタフェースL3設定）。:contentReference[oaicite:7]{index=7}

! --- 到達性（対向クライアントネットへの静的経路）---
ip route 192.168.20.0/24 10.0.12.1
