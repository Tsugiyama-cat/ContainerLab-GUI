hostname CX2

snmp-server vrf default
snmp-server community public ro
snmp-server system-location "Lab"
snmp-server system-contact "admin@example.local"

vlan 10
  name CLIENTS

interface 1/1/3
  no shutdown
  description CLIENT2
  access vlan 10

interface vlan 10
  ip address 192.168.20.1/24

interface 1/1/2
  no shutdown
  routing
  ip address 10.0.12.1/31

ip route 192.168.10.0/24 10.0.12.0
